<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablero de Deudas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --red-bright: #e0463a; --green: #8fd9a8; }
    * { box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #ededea;
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 18px 80px;
    }
    header {
      text-align: center;
      padding: 18px 0 28px;
      border-bottom: 1px solid rgba(237,237,234,0.1);
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      margin: 0;
      letter-spacing: 0.01em;
      color: #ededea;
    }
    h1 .accent { color: #e0463a; font-style: italic; }
    .tagline {
      font-size: 0.92rem;
      color: rgba(237,237,234,0.55);
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    section { margin-bottom: 34px; }
    .section-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      text-align: center;
    }
    .section-head h2 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.35rem;
      margin: 0;
      color: #ededea;
    }
    .section-head .underline {
      width: 46px;
      height: 2px;
      background: #e0463a;
      margin-top: 10px;
      border-radius: 2px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid rgba(237,237,234,0.1);
      border-radius: 14px;
      padding: 18px;
      color: #ededea;
    }
    .players { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d0d0d;
      border: 1px solid rgba(237,237,234,0.1);
      border-radius: 999px;
      padding: 7px 8px 7px 14px;
      font-size: 0.92rem;
    }
    .chip .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }
    .chip button {
      background: none;
      border: none;
      color: rgba(237,237,234,0.4);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 50%;
    }
    .add-player {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    input, select {
      background: #0d0d0d;
      border: 1px solid rgba(237,237,234,0.1);
      color: #ededea;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
    }
    select { cursor: pointer; }
    .btn {
      background: #c0392b;
      color: #ededea;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.92rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }
    .form-grid .arrow {
      text-align: center;
      color: #8a8a8a;
      font-size: 1.2rem;
    }
    .form-row2 {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .submit-row {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }
    .balance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 2px;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .balance-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
    }
    .balance-name .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chevron {
      color: rgba(237,237,234,0.35);
      font-size: 0.7rem;
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .balance-item.open .chevron { transform: rotate(90deg); }
    .balance-amt {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.05rem;
      text-align: right;
    }
    .balance-amt.owes { color: #e0463a; }
    .balance-amt.owed { color: #8fd9a8; }
    .balance-amt.even { color: rgba(237,237,234,0.35); }
    .balance-detail-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s ease;
    }
    .balance-item.open .balance-detail-wrap { grid-template-rows: 1fr; }
    .balance-detail-inner { overflow: hidden; }
    .balance-detail-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 0 2px 12px;
    }
    .detail-col-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(237,237,234,0.35);
      margin-bottom: 8px;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.88rem;
    }
    .detail-amt {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }
    .detail-empty {
      font-size: 0.82rem;
      color: rgba(237,237,234,0.25);
      font-style: italic;
    }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filters select { flex: 1; min-width: 120px; }
    .entry {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(237,237,234,0.1);
    }
    .entry:last-child { border-bottom: none; }
    .entry.paid { opacity: 0.5; }
    .entry-main { min-width: 0; }
    .entry-route {
      font-weight: 600;
      font-size: 0.96rem;
      color: #ededea;
    }
    .arrow-sm { color: #e0463a; margin: 0 4px; }
    .for-suffix { font-weight: 400; color: rgba(237,237,234,0.5); font-size: 0.85rem; }
    .entry-meta {
      font-size: 0.78rem;
      color: rgba(237,237,234,0.4);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 3px;
    }
    .entry-side {
      text-align: right;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .entry-amt {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.05rem;
      color: #ededea;
    }
    .badge {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(237,237,234,0.1);
      color: rgba(237,237,234,0.55);
      cursor: pointer;
      background: none;
    }
    .badge:hover { border-color: #c0392b; color: #e0463a; }
    .badge.is-paid { border-color: rgba(237,237,234,0.3); color: rgba(237,237,234,0.6); }
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.75rem;
      color: rgba(237,237,234,0.25);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
